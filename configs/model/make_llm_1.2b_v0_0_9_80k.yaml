model_type: llama
architecture: decoder_only
vocab_size: 80000
hidden_size: 2048
intermediate_size: 4096
num_hidden_layers: 28
num_attention_heads: 16
num_key_value_heads: 8
head_dim: 128
max_position_embeddings: 4096
rope_theta: 10000.0
rms_norm_eps: 1.0e-5
attention_dropout: 0.0
hidden_dropout: 0.0
initializer_range: 0.02
tie_word_embeddings: true
precision: bf16
notes:
  - v0.0.9 official scratch model config.
  - Uses 80K SentencePiece BPE vocabulary trained from the v0.0.9 official data mix.
  - Same dense decoder-only architecture family as v0.0.8, with tokenizer/vocab updated.
  - Estimated parameter count is about 1.221B with tied word embeddings.
